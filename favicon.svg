<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Rounded square background -->
  <rect width="64" height="64" rx="15" fill="url(#bg)"/>

  <!-- Subtle inner highlight -->
  <rect x="1" y="1" width="62" height="30" rx="14" fill="rgba(255,255,255,0.07)"/>

  <!-- Headphone arc -->
  <path d="M15 33 v-7 a17 17 0 0 1 34 0 v7"
        fill="none" stroke="white" stroke-width="5"
        stroke-linecap="round" filter="url(#glow)"/>

  <!-- Left ear cup -->
  <rect x="11" y="30" width="10" height="15" rx="5" fill="white" filter="url(#glow)"/>

  <!-- Right ear cup -->
  <rect x="43" y="30" width="10" height="15" rx="5" fill="white" filter="url(#glow)"/>

  <!-- Small music note dot (optional accent) -->
  <circle cx="32" cy="47" r="2.5" fill="rgba(255,255,255,0.5)"/>
</svg>
